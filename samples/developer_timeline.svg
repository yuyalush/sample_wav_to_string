<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">開発作業共有タイムライン</title>
  <desc id="desc">時系列に並んだ開発者向け作業共有一覧。時間、種別、内容、担当者の列を持つ。</desc>

  <rect width="1400" height="900" fill="#000000" />

  <g fill="none" stroke="#ffffff" stroke-width="2">
    <rect x="60" y="70" width="1280" height="760" rx="18" />
    <line x1="220" y1="150" x2="220" y2="830" />
    <line x1="420" y1="150" x2="420" y2="830" />
    <line x1="980" y1="150" x2="980" y2="830" />
    <line x1="60" y1="150" x2="1340" y2="150" />
    <line x1="60" y1="230" x2="1340" y2="230" />
    <line x1="60" y1="310" x2="1340" y2="310" />
    <line x1="60" y1="390" x2="1340" y2="390" />
    <line x1="60" y1="470" x2="1340" y2="470" />
    <line x1="60" y1="550" x2="1340" y2="550" />
    <line x1="60" y1="630" x2="1340" y2="630" />
    <line x1="60" y1="710" x2="1340" y2="710" />
    <line x1="60" y1="790" x2="1340" y2="790" />
  </g>

  <g fill="#ffffff" font-family="Noto Sans JP, Yu Gothic, Hiragino Sans, sans-serif">
    <text x="70" y="42" font-size="32" font-weight="700">開発作業共有ボード</text>
    <text x="1060" y="42" font-size="18" text-anchor="end">sample_wav_to_string</text>
    <text x="1330" y="42" font-size="18" text-anchor="end">更新日 2026-05-29</text>

    <text x="92" y="118" font-size="24" font-weight="700">時間</text>
    <text x="282" y="118" font-size="24" font-weight="700">種別</text>
    <text x="455" y="118" font-size="24" font-weight="700">内容</text>
    <text x="1105" y="118" font-size="24" font-weight="700">担当者</text>

    <text x="92" y="198" font-size="22">09:00</text>
    <text x="262" y="198" font-size="22">確認</text>
    <text x="455" y="198" font-size="22">比較ロジックの現状確認と既存テストの読み合わせ</text>
    <text x="1105" y="198" font-size="22">山田</text>

    <text x="92" y="278" font-size="22">09:40</text>
    <text x="262" y="278" font-size="22">調査</text>
    <text x="455" y="278" font-size="22">Azure Speech の認識失敗時メッセージを整理して原因を切り分け</text>
    <text x="1105" y="278" font-size="22">佐藤</text>

    <text x="92" y="358" font-size="22">10:20</text>
    <text x="262" y="358" font-size="22">実装</text>
    <text x="455" y="358" font-size="22">文字列正規化の改善案を作成して句読点の扱いを検討</text>
    <text x="1105" y="358" font-size="22">高橋</text>

    <text x="92" y="438" font-size="22">11:10</text>
    <text x="262" y="438" font-size="22">レビュー</text>
    <text x="455" y="438" font-size="22">CLI の引数設計とエラーコードの返し方をチームで確認</text>
    <text x="1105" y="438" font-size="22">伊藤</text>

    <text x="92" y="518" font-size="22">13:00</text>
    <text x="262" y="518" font-size="22">実装</text>
    <text x="455" y="518" font-size="22">JSON 出力の追加方針をまとめて自動化向けの項目を整理</text>
    <text x="1105" y="518" font-size="22">中村</text>

    <text x="92" y="598" font-size="22">14:15</text>
    <text x="262" y="598" font-size="22">検証</text>
    <text x="455" y="598" font-size="22">unittest discover で比較テストが通ることを再確認</text>
    <text x="1105" y="598" font-size="22">小林</text>

    <text x="92" y="678" font-size="22">15:30</text>
    <text x="262" y="678" font-size="22">共有</text>
    <text x="455" y="678" font-size="22">README の実行例とテスト手順の差分をドキュメント化</text>
    <text x="1105" y="678" font-size="22">加藤</text>

    <text x="92" y="758" font-size="22">16:20</text>
    <text x="262" y="758" font-size="22">次対応</text>
    <text x="455" y="758" font-size="22">WAV 形式の事前チェック追加を次スプリント候補として登録</text>
    <text x="1105" y="758" font-size="22">鈴木</text>

    <text x="70" y="865" font-size="18">黒背景に白線と白文字で統一した、開発者向けの時系列共有一覧イメージ</text>
  </g>
</svg>